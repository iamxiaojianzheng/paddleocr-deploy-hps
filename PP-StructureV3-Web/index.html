<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PP-StructureV3 API 测试预览工具</title>
    <!-- Google Fonts Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked.js 用于 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Github Markdown CSS (用于预览) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    
    <!-- 本地样式 -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部导航栏 -->
        <header class="app-header">
            <div class="logo-area">
                <span class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="9" x2="15" y2="9"/>
                        <line x1="9" y1="13" x2="15" y2="13"/>
                        <line x1="9" y1="17" x2="13" y2="17"/>
                    </svg>
                </span>
                <h1>PP-StructureV3 <span class="badge">API Studio</span></h1>
            </div>
            
            <div class="header-actions">
                <div class="global-config">
                    <div class="input-group">
                        <label for="apiUrl">API Base URL</label>
                        <div class="url-input-wrapper">
                            <input type="url" id="apiUrl" value="http://localhost:8082" placeholder="http://localhost:8082">
                            <span class="status-dot" id="apiStatusDot" title="检测中..."></span>
                        </div>
                    </div>
                </div>
                <button type="button" class="theme-toggle-btn" id="themeToggleBtn" title="切换主题">
                    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区域（左右分栏） -->
        <main class="app-body">
            <!-- 左栏：请求配置 -->
            <section class="config-panel glass-panel">
                <div class="panel-header">
                    <h2 style="font-size: 14px; font-weight: 600; color: var(--text-primary);">版面解析参数配置</h2>
                </div>

                <div class="panel-body">
                    <!-- /layout-parsing 参数配置表单 -->
                    <form id="layoutParsingForm" class="api-form active">
                        <!-- 文件输入区域 -->
                        <div class="form-section">
                            <h3 class="section-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                    <polyline points="14 2 14 8 20 8"/>
                                    <line x1="16" y1="13" x2="8" y2="13"/>
                                    <line x1="16" y1="17" x2="8" y2="17"/>
                                    <polyline points="10 9 9 9 8 9"/>
                                </svg>
                                输入文件
                            </h3>
                            <div class="upload-area" id="uploadArea">
                                <input type="file" id="fileInput" accept="image/*,application/pdf" style="display: none;">
                                <div class="upload-placeholder">
                                    <span class="upload-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                            <polyline points="17 8 12 3 7 8"/>
                                            <line x1="12" y1="3" x2="12" y2="15"/>
                                        </svg>
                                    </span>
                                    <p>拖拽或点击上传图片/PDF</p>
                                    <span class="file-info-text">支持 PNG, JPG, JPEG, PDF</span>
                                </div>
                                <div class="upload-preview" style="display: none;">
                                    <span class="preview-type-icon">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                            <polyline points="14 2 14 8 20 8"/>
                                        </svg>
                                    </span>
                                    <span class="preview-filename">filename.pdf</span>
                                    <button type="button" class="btn-clear-file">移除</button>
                                </div>
                            </div>
                            
                            <div class="divider-text">或者</div>
                            
                            <div class="form-group">
                                <label for="fileUrl">文件 URL</label>
                                <input type="url" id="fileUrl" placeholder="https://example.com/document.pdf">
                            </div>
                            
                            <div class="form-group">
                                <label for="fileType">文件类型 (fileType) <span class="info-icon" data-tooltip="文件类型。0表示PDF文件，1表示图像文件。若请求体无此属性，则将根据URL推断文件类型。">?</span></label>
                                <select id="fileType">
                                    <option value="">自动检测 (根据文件后缀)</option>
                                    <option value="0">PDF 文件 (0)</option>
                                    <option value="1">图像文件 (1)</option>
                                </select>
                            </div>
                        </div>

                        <!-- 核心开关参数 -->
                        <div class="form-section">
                            <h3 class="section-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="4" y1="21" x2="4" y2="14"/>
                                    <line x1="4" y1="10" x2="4" y2="3"/>
                                    <line x1="12" y1="21" x2="12" y2="12"/>
                                    <line x1="12" y1="8" x2="12" y2="3"/>
                                    <line x1="20" y1="21" x2="20" y2="16"/>
                                    <line x1="20" y1="12" x2="20" y2="3"/>
                                    <line x1="1" y1="14" x2="7" y2="14"/>
                                    <line x1="9" y1="8" x2="15" y2="8"/>
                                    <line x1="17" y1="16" x2="23" y2="16"/>
                                </svg>
                                核心功能开关
                            </h3>
                            <div class="switch-grid">
                                <div class="switch-item">
                                    <label class="switch-label" for="useTableRecognition">
                                        <span class="label-title">表格识别 <span class="info-icon" data-tooltip="是否在推理时使用表格识别子产线，开启后，可以将文档中的表格转换为HTML或Markdown的结构化格式；若不开启，表格会保留为图片形式，默认初始化为 True。">?</span></span>
                                        <span class="label-desc">useTableRecognition (默认开启)</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useTableRecognition" checked>
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useFormulaRecognition">
                                        <span class="label-title">公式识别 <span class="info-icon" data-tooltip="是否在推理时使用公式识别子产线，开启后，可以将数学公式转换为LaTeX代码；若不开启，公式会按普通文本识别，默认初始化为 True。">?</span></span>
                                        <span class="label-desc">useFormulaRecognition (默认开启)</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useFormulaRecognition" checked>
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useRegionDetection">
                                        <span class="label-title">复杂版面处理 <span class="info-icon" data-tooltip="是否在推理时使用文档区域检测模块，开启后，可以更好地识别报纸、杂志等排版复杂的文档内容，提高识别准确性，默认初始化为 True。">?</span></span>
                                        <span class="label-desc">useRegionDetection (默认开启)</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useRegionDetection" checked>
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useDocOrientationClassify">
                                        <span class="label-title">图片方向矫正 <span class="info-icon" data-tooltip="是否在推理时使用文档方向分类模块，开启后，可以自动识别并矫正 0°、90°、180°、270°的图片，默认初始化为 False。">?</span></span>
                                        <span class="label-desc">useDocOrientationClassify</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useDocOrientationClassify">
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useDocUnwarping">
                                        <span class="label-title">图片扭曲矫正 <span class="info-icon" data-tooltip="是否在推理时使用文本图像矫正模块，开启后，可以自动矫正扭曲图片，例如褶皱、倾斜等情况，默认初始化为 False。">?</span></span>
                                        <span class="label-desc">useDocUnwarping</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useDocUnwarping">
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useTextlineOrientation">
                                        <span class="label-title">文本行方向矫正 <span class="info-icon" data-tooltip="是否在推理时使用文本行方向分类模块，开启后，可以自动识别和矫正 0° 和 180° 的文本行，默认初始化为 False。">?</span></span>
                                        <span class="label-desc">useTextlineOrientation</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useTextlineOrientation">
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useSealRecognition">
                                        <span class="label-title">印章识别 <span class="info-icon" data-tooltip="是否在推理时使用印章文本识别子产线，开启后，可以识别文档中的印章内容，默认初始化为 False。">?</span></span>
                                        <span class="label-desc">useSealRecognition</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useSealRecognition">
                                        <span class="slider"></span>
                                    </label>
                                </div>

                                <div class="switch-item">
                                    <label class="switch-label" for="useChartRecognition">
                                        <span class="label-title">图表转表格 <span class="info-icon" data-tooltip="是否在推理时使用图表解析模块，开启后，可以自动解析文档中的图表并转换为表格形式，默认初始化为 False。">?</span></span>
                                        <span class="label-desc">useChartRecognition</span>
                                    </label>
                                    <label class="switch">
                                        <input type="checkbox" id="useChartRecognition">
                                        <span class="slider"></span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- 高级推理参数 (可折叠) -->
                        <details class="form-section expandable">
                            <summary class="section-title">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <circle cx="12" cy="12" r="3"/>
                                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                                </svg>
                                高级参数配置
                            </summary>
                            <div class="form-grid">
                                <h4 style="font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 5px;">版面分析参数</h4>
                                
                                <div class="form-group">
                                    <label for="layoutThreshold">版面模型阈值 (layoutThreshold) <span class="info-icon" data-tooltip="版面模型得分阈值，0-1 之间的任意浮点数。如果不设置，将使用产线初始化的该参数值，默认为 0.5。">?</span></label>
                                    <input type="number" id="layoutThreshold" step="0.05" placeholder="默认 0.5">
                                </div>
 
                                <div class="form-group">
                                    <label for="layoutUnclipRatio">检测框扩张系数 (layoutUnclipRatio) <span class="info-icon" data-tooltip="版面区域检测模型检测框的扩张系数。 任意大于 0 浮点数。如果不设置，将使用产线初始化默认值 1.0。">?</span></label>
                                    <input type="number" id="layoutUnclipRatio" step="0.1" placeholder="默认 1.0">
                                </div>

                                <div class="form-group">
                                    <label for="layoutMergeBboxesMode">重叠框过滤方式 (layoutMergeBboxesMode) <span class="info-icon" data-tooltip="对于互相重叠的检测框的处理：large(仅保留外部最大框), small(仅保留内部小框), union(都保留)。">?</span></label>
                                    <select id="layoutMergeBboxesMode">
                                        <option value="">默认 (large)</option>
                                        <option value="large">只保留外侧大框 (large)</option>
                                        <option value="small">只保留被包含小框 (small)</option>
                                        <option value="union">都保留 (union)</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label" style="margin-top: 8px;">
                                        <input type="checkbox" id="layoutNms"> 开启 NMS 后处理 (layoutNms) <span class="info-icon" data-tooltip="开启后，会自动移除重复或高度重叠的区域框。">?</span>
                                    </label>
                                </div>

                                <h4 style="font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 10px;">文本检测/识别参数</h4>

                                <div class="form-group">
                                    <label for="textDetLimitSideLen">文本检测图像边长限制 (textDetLimitSideLen) <span class="info-icon" data-tooltip="文本检测的图像边长限制。大于 0 的任意整数。如果不设置，默认初始化为 736。">?</span></label>
                                    <input type="number" id="textDetLimitSideLen" placeholder="默认 736">
                                </div>

                                <div class="form-group">
                                    <label for="textDetLimitType">检测限制边长类型 (textDetLimitType) <span class="info-icon" data-tooltip="文本检测的边长度限制类型。支持 min 和 max。min 表示最短边限制，max 表示最长边限制。默认初始化为 min。">?</span></label>
                                    <select id="textDetLimitType">
                                        <option value="">默认 (min)</option>
                                        <option value="min">限制最短边 (min)</option>
                                        <option value="max">限制最长边 (max)</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="textDetThresh">文本检测像素阈值 (textDetThresh) <span class="info-icon" data-tooltip="得分大于该阈值的像素点才会被认为是文字像素点。如果不设置，将使用默认初始值 0.3。">?</span></label>
                                    <input type="number" id="textDetThresh" step="0.05" placeholder="默认 0.3">
                                </div>

                                <div class="form-group">
                                    <label for="textDetBoxThresh">文本检测框阈值 (textDetBoxThresh) <span class="info-icon" data-tooltip="检测区域所有像素点的平均得分大于该阈值时被认为是文字区域。如果不设置，默认初始值为 0.6。">?</span></label>
                                    <input type="number" id="textDetBoxThresh" step="0.05" placeholder="默认 0.6">
                                </div>

                                <div class="form-group">
                                    <label for="textDetUnclipRatio">文本检测扩张系数 (textDetUnclipRatio) <span class="info-icon" data-tooltip="文本检测扩张系数，使用该方法对文字区域进行扩张。该值越大扩张面积越大，如果不设置，默认为 1.5。">?</span></label>
                                    <input type="number" id="textDetUnclipRatio" step="0.1" placeholder="默认 1.5">
                                </div>

                                <div class="form-group">
                                    <label for="textRecScoreThresh">文本识别过滤阈值 (textRecScoreThresh) <span class="info-icon" data-tooltip="文本识别阈值，得分大于该阈值的文本结果会被保留。如果不设置，默认初始值为 0.0（不设阈值）。">?</span></label>
                                    <input type="number" id="textRecScoreThresh" step="0.05" placeholder="默认 0.0 (不限制)">
                                </div>

                                <h4 style="font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 10px;">印章检测/识别参数</h4>

                                <div class="form-group">
                                    <label for="sealDetLimitSideLen">印章检测边长限制 (sealDetLimitSideLen) <span class="info-icon" data-tooltip="印章文本检测的图像边长限制。大于 0 的任意整数。如果不设置，默认初始化为 736。">?</span></label>
                                    <input type="number" id="sealDetLimitSideLen" placeholder="默认 736">
                                </div>

                                <div class="form-group">
                                    <label for="sealDetLimitType">印章检测限制类型 (sealDetLimitType) <span class="info-icon" data-tooltip="印章检测边长限制类型，支持 min 和 max。默认初始化为 min。">?</span></label>
                                    <select id="sealDetLimitType">
                                        <option value="">默认 (min)</option>
                                        <option value="min">限制最短边 (min)</option>
                                        <option value="max">限制最长边 (max)</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label for="sealDetThresh">印章检测像素阈值 (sealDetThresh) <span class="info-icon" data-tooltip="印章得分大于该阈值的像素点才会被认为是印章文字像素点。如果不设置，默认使用产线初始值 0.2。">?</span></label>
                                    <input type="number" id="sealDetThresh" step="0.05" placeholder="默认 0.2">
                                </div>

                                <div class="form-group">
                                    <label for="sealDetBoxThresh">印章检测框阈值 (sealDetBoxThresh) <span class="info-icon" data-tooltip="印章检测区域内像素点的平均得分大于该阈值时被判定为印章区域。如果不设置，默认使用产线初始值 0.6。">?</span></label>
                                    <input type="number" id="sealDetBoxThresh" step="0.05" placeholder="默认 0.6">
                                </div>

                                <div class="form-group">
                                    <label for="sealDetUnclipRatio">印章检测扩张系数 (sealDetUnclipRatio) <span class="info-icon" data-tooltip="印章检测扩张系数，用于对检测到的印章文字区域进行向外扩张。如果不设置，默认使用产线初始值 0.5。">?</span></label>
                                    <input type="number" id="sealDetUnclipRatio" step="0.1" placeholder="默认 0.5">
                                </div>

                                <div class="form-group">
                                    <label for="sealRecScoreThresh">印章文本识别阈值 (sealRecScoreThresh) <span class="info-icon" data-tooltip="印章文本识别阈值，得分大于该阈值的印章识别文本才会被保留。如果不设置，默认使用产线初始值 0.0。">?</span></label>
                                    <input type="number" id="sealRecScoreThresh" step="0.05" placeholder="默认 0.0 (不限制)">
                                </div>

                                <h4 style="font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 10px;">表格解析细项参数</h4>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useWiredTableCellsTransToHtml"> 有线表结果直转 HTML <span class="info-icon" data-tooltip="是否启用有线表单元格检测结果直转HTML，启用则直接基于有线表单元格检测结果的几何关系构建HTML。">?</span>
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useWirelessTableCellsTransToHtml"> 无线表结果直转 HTML <span class="info-icon" data-tooltip="是否启用无线表单元格检测结果直转HTML，启用则直接基于无线表单元格检测结果的几何关系构建HTML。">?</span>
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useTableOrientationClassify"> 开启表格方向分类与矫正 <span class="info-icon" data-tooltip="是否启用表格使用表格方向分类，启用时当图像中的表格存在90°、180°、270°旋转时，能够将方向校正并正确完成表格识别。">?</span>
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useOcrResultsWithTableCells"> 开启单元格切分 OCR 识别 <span class="info-icon" data-tooltip="是否启用单元格切分OCR，启用时会基于单元格预测结果对OCR检测结果进行切分和重识别，避免出现文字缺失情况。">?</span>
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useE2eWiredTableRecModel"> 有线表格端到端模型识别 <span class="info-icon" data-tooltip="是否启用有线表端到端表格识别模式，启用则不使用单元格检测模型，只使用表格结构识别模型。">?</span>
                                    </label>
                                </div>

                                <div class="form-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useE2eWirelessTableRecModel"> 无线表格端到端模型识别 <span class="info-icon" data-tooltip="是否启用无线表端到端表格识别模式，启用则不使用单元格检测模型，只使用表格结构识别模型。">?</span>
                                    </label>
                                </div>

                                <h4 style="font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 10px;">通用返回控制</h4>

                                <div class="form-group">
                                    <label for="visualize">返回可视化标注图 (visualize) <span class="info-icon" data-tooltip="是否返回可视化结果图及处理过程中的中间图像。开启此功能后，将增加结果返回时间。">?</span></label>
                                    <select id="visualize">
                                        <option value="">默认 (由服务端配置决定)</option>
                                        <option value="true">返回可视化图 (true)</option>
                                        <option value="false">不返回可视化图 (false)</option>
                                    </select>
                                </div>
                            </div>
                        </details>
                    </form>
                </div>

                <div class="panel-footer">
                    <button type="button" id="btnSend" class="btn-primary">
                        <span class="btn-text">发送 API 请求</span>
                        <span class="spinner" style="display: none;"></span>
                    </button>
                </div>
            </section>

            <!-- 右栏：响应结果预览 -->
            <section class="results-panel glass-panel">
                <!-- 状态指示器与基本信息 -->
                <div class="status-bar" id="statusBar" style="display: none;">
                    <div class="status-left">
                        <span class="status-badge" id="statusBadge">200 OK</span>
                        <span class="time-badge" id="timeBadge">1.2s</span>
                    </div>
                    <div class="status-right">
                        <span class="log-id-label">Log ID:</span>
                        <code class="log-id-value" id="logIdValue">N/A</code>
                    </div>
                </div>

                <!-- 空状态占位 -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-illustration">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                            <polyline points="14 2 14 8 20 8"/>
                            <line x1="16" y1="13" x2="8" y2="13"/>
                            <line x1="16" y1="17" x2="8" y2="17"/>
                            <line x1="10" y1="9" x2="8" y2="9"/>
                            <line x1="2" y1="12" x2="22" y2="12" stroke-dasharray="2 2"/>
                        </svg>
                    </div>
                    <h3>等待发送请求</h3>
                    <p>配置左侧参数并点击“发送请求”，在此处实时查看文档版面解析结果。</p>
                </div>

                <!-- 实际结果容器 -->
                <div class="results-container" id="resultsContainer" style="display: none;">
                    <div class="results-header">
                        <!-- 单页/多页分页导航 -->
                        <div class="page-selector" id="pageSelector" style="display: none;">
                            <span class="selector-label">选择页面：</span>
                            <div class="page-buttons" id="pageButtons">
                                <!-- 动态插入 -->
                            </div>
                        </div>

                        <!-- 格式展示切换 -->
                        <div class="tabs result-format-tabs" id="resultFormatTabs">
                            <button class="tab-btn active" data-tab="markdown">Markdown 预览</button>
                            <button class="tab-btn" data-tab="images">可视化图</button>
                            <button class="tab-btn" data-tab="input">输入图像</button>
                            <button class="tab-btn" data-tab="json">JSON 结果</button>
                        </div>
                    </div>

                    <div class="results-body">
                        <!-- Markdown 预览 -->
                        <div class="result-view active" id="viewMarkdown">
                            <div class="markdown-body" id="markdownRendered">
                                <!-- marked.js 渲染内容 -->
                            </div>
                        </div>

                        <!-- 可视化图 -->
                        <div class="result-view" id="viewImages">
                            <div class="images-grid" id="visualizeImagesGrid">
                                <!-- 动态生成的 Base64 img 标签 -->
                            </div>
                        </div>

                        <!-- 输入图像 -->
                        <div class="result-view" id="viewInput">
                            <div class="input-image-container">
                                <img id="inputImagePreview" src="" alt="输入图像">
                            </div>
                        </div>

                        <!-- JSON 结果 -->
                        <div class="result-view" id="viewJson">
                            <div class="json-actions">
                                <button type="button" id="btnCopyJson" class="btn-text">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;">
                                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                                    </svg>
                                    复制 JSON
                                </button>
                            </div>
                            <pre class="json-renderer"><code id="jsonRaw"></code></pre>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 模态/遮罩层提示 -->
    <div id="toast" class="toast">提示信息</div>

    <!-- 图像放大预览模态框 -->
    <div id="imagePreviewModal" class="image-preview-modal" style="display: none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close-btn" aria-label="关闭">&times;</button>
            <img id="modalPreviewImage" src="" alt="预览图像">
            <!-- 悬浮预览工具栏 -->
            <div class="modal-toolbar">
                <button class="toolbar-btn" id="btnZoomIn" title="放大">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                </button>
                <button class="toolbar-btn" id="btnZoomOut" title="缩小">
                    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                </button>
                <button class="toolbar-btn" id="btnRotateLeft" title="左旋转">
                    <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>
                </button>
                <button class="toolbar-btn" id="btnRotateRight" title="右旋转">
                    <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><polyline points="21 3 21 8 16 8"></polyline></svg>
                </button>
                <button class="toolbar-btn" id="btnReset" title="复原">
                    <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- 加载逻辑代码 -->
    <script src="js/api.js"></script>
    <script src="js/params.js"></script>
    <script src="js/results.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
